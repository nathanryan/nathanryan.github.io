<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Primary Gradient -->
    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    
    <!-- Subtle Background Glow -->
    <linearGradient id="bg-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Base Canvas (Squircle) -->
  <rect width="512" height="512" rx="112" fill="#0f172a" />
  
  <!-- Glowing effect behind the logo -->
  <circle cx="256" cy="256" r="180" fill="url(#bg-glow)" />

  <g stroke="url(#icon-grad)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none">
    
    <!-- Left Bracket < -->
    <path d="M 100 196 L 40 256 L 100 316" stroke-opacity="0.4" />
    
    <!-- Right Bracket > -->
    <path d="M 412 196 L 472 256 L 412 316" stroke-opacity="0.4" />

    <!-- Letter N -->
    <path d="M 151 340 L 151 172 L 231 340 L 231 172" />
    
    <!-- Letter R -->
    <path d="M 261 340 L 261 172 L 311 172 C 339 172 361 194 361 222 C 361 250 339 272 311 272 L 261 272 M 301 272 L 351 340" />
    
  </g>
</svg>
